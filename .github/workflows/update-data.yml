name: Actualizar datos meteorológicos

# v91.6 (Fase 0): añade ping opcional a healthchecks.io al final de cada ejecución.
# Si el workflow deja de ejecutarse (cron de GitHub retrasado/saltado) o falla,
# healthchecks.io te avisa por email. El resto del workflow es idéntico a v91.5.
#
# El cron interno se mantiene como RESPALDO; el disparador principal pasa a ser
# cron-job.org llamando a workflow_dispatch (ver LEEME_PARCHE_V91_23_FASE0.md).

on:
  workflow_dispatch:
  schedule:
    # Cada 30 minutos. Usamos minutos 17 y 47 para evitar el minuto 00,
    # donde GitHub suele acumular más carga y puede retrasar o saltarse ejecuciones.
    # Importante: GitHub Actions cron usa UTC.
    - cron: "17,47 * * * *"

permissions:
  contents: write

concurrency:
  group: actualizar-datos-meteorologicos
  cancel-in-progress: true

jobs:
  update-data:
    name: Generar y guardar datos_playas.json
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      AEMET_API_KEY: ${{ secrets.AEMET_API_KEY }}
      AEMET_OPENDATA_AREA: esp
      # v91.11 · 9 jul 2026. Desde el runner de GitHub, TODAS las peticiones a
      # maps.andalucia.org morían por timeout (elapsed_ms 120011, truncated:true,
      # "This operation was aborted" x40). Desde un PC en España responden en ~226 ms.
      # Node 18+ resuelve DNS en orden "verbatim": si hay registro AAAA y la ruta IPv6
      # no funciona, se queda esperando hasta el abort. Los runners tienen IPv6; tu PC
      # prefiere IPv4. Esto fuerza IPv4 en TODOS los pasos, incluida la regeneración
      # que hace el paso de push si el remoto ha avanzado.
      NODE_OPTIONS: --dns-result-order=ipv4first
      # TEMPORAL: apagado mientras diagnosticamos. Cada run desperdiciaba 180 s.
      # Volver a quitar esta línea (o poner "true") cuando el diagnóstico esté resuelto.
      JUNTA_OFICIAL: "false"
      # Márgenes algo más anchos que en local: el runner está más lejos.
      # Solo penalizan cuando algo va mal; si responde en 226 ms, no se notan.
      JUNTA_TIMEOUT_MS: "10000"
      JUNTA_BUDGET_MS: "180000"

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configurar Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Sincronizar con main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Validar secret AEMET
        run: |
          if [ -z "$AEMET_API_KEY" ]; then
            echo "::error::Falta el secret AEMET_API_KEY en este repositorio"
            exit 1
          fi
          echo "AEMET_API_KEY configurada"

      - name: Comprobar sintaxis del generador
        run: node --check build-data.mjs

      # ── TEMPORAL (v91.11d) · ÚLTIMO DIAGNÓSTICO ────────────────────────────
      # Confirmado (run #396): sin proxy · TCP 443 abre desde bash · curl -4 da 200
      # dos veces (92-287 ms) · openssl completa el TLS · Node, por IP, TIMEOUT + RST.
      # No es red, ni DNS, ni undici. Queda UNA capa: el saludo TLS de Node.
      # Esto separa TCP de TLS y prueba si TLS 1.2 lo desatasca.
      - name: Diagnóstico Junta
        continue-on-error: true
        run: |
          IP=217.12.19.133
          HOST=maps.andalucia.org

          echo "=== 0 · control: curl sigue funcionando en ESTA vm ==="
          curl -s -o /dev/null -4 --max-time 15 \
            -w "  http=%{http_code} conexion=%{time_connect}s total=%{time_total}s\n" \
            https://$HOST/rest-turistico/rest/beach/get/16204 || echo "  curl FALLA"

          echo ""
          echo "=== 0b · que version de TLS negocia openssl ==="
          timeout 12 openssl s_client -connect $IP:443 -servername $HOST -brief </dev/null 2>&1 \
            | grep -Ei 'protocol|cipher|verification' || echo "  openssl FALLA"

          echo ""
          node - <<'NODE'
          const net=require('node:net'), tls=require('node:tls'), https=require('node:https');
          const IP='217.12.19.133', HOST='maps.andalucia.org';
          const PATH='/rest-turistico/rest/beach/get/16204';

          const t=()=>Date.now();
          function paso(n,txt){console.log('\n'+n+' · '+txt);}

          function tcp(){return new Promise(res=>{
            const t0=t(); const s=net.connect({host:IP,port:443});
            s.setTimeout(10000);
            s.on('connect',()=>{console.log('  TCP conectado en '+(t()-t0)+' ms'); s.destroy(); res(true);});
            s.on('timeout',()=>{console.log('  TCP TIMEOUT tras '+(t()-t0)+' ms'); s.destroy(); res(false);});
            s.on('error',e=>{console.log('  TCP '+e.code+' tras '+(t()-t0)+' ms'); res(false);});
          });}

          function handshake(nombre,opts){return new Promise(res=>{
            const t0=t();
            const s=tls.connect(Object.assign({host:IP,port:443,servername:HOST},opts));
            s.setTimeout(12000);
            s.on('secureConnect',()=>{console.log('  '+nombre+' -> OK '+s.getProtocol()+' / '+(s.getCipher()||{}).name+' en '+(t()-t0)+' ms'); s.destroy(); res(true);});
            s.on('timeout',()=>{console.log('  '+nombre+' -> TIMEOUT tras '+(t()-t0)+' ms'); s.destroy(); res(false);});
            s.on('error',e=>{console.log('  '+nombre+' -> '+e.code+' '+e.message+' tras '+(t()-t0)+' ms'); res(false);});
          });}

          function get(nombre,opts){return new Promise(res=>{
            const t0=t();
            const r=https.get(Object.assign({host:IP,servername:HOST,path:PATH,headers:{Host:HOST},timeout:12000},opts),
              x=>{x.resume(); console.log('  '+nombre+' -> http='+x.statusCode+' en '+(t()-t0)+' ms'); res(true);});
            r.on('timeout',()=>{console.log('  '+nombre+' -> TIMEOUT tras '+(t()-t0)+' ms'); r.destroy(); res(false);});
            r.on('error',e=>{console.log('  '+nombre+' -> '+e.code+' tras '+(t()-t0)+' ms'); res(false);});
          });}

          (async()=>{
            paso('1','TCP puro, sin TLS');
            await tcp();

            paso('2','Handshake TLS con los ajustes por defecto de Node');
            await handshake('tls por defecto', {});

            paso('3','Handshake TLS forzando TLS 1.2 (el clasico con balanceadores viejos)');
            await handshake('tls maxVersion 1.2', {maxVersion:'TLSv1.2', minVersion:'TLSv1.2'});

            paso('4','Handshake TLS con la lista de cifrados de OpenSSL, no la de Node');
            await handshake('tls ciphers DEFAULT', {ciphers:'DEFAULT@SECLEVEL=1'});

            paso('5','https.get forzando TLS 1.2');
            await get('https 1.2', {maxVersion:'TLSv1.2', minVersion:'TLSv1.2'});

            paso('6','control final: ¿sigue viva la vm?');
          })();
          NODE

          echo ""
          echo "=== 7 · curl, por ultima vez ==="
          curl -s -o /dev/null -4 --max-time 15 \
            -w "  http=%{http_code} total=%{time_total}s\n" \
            https://$HOST/rest-turistico/rest/beach/get/16204 || echo "  curl FALLA"
      # ───────────────────────────────────────────────────────────────────────

      - name: Generar datos meteorológicos
        run: node build-data.mjs

      - name: Validar JSON generado
        run: |
          test -f datos_playas.json
          node - <<'NODE'
          const fs = require('fs');
          const raw = fs.readFileSync('datos_playas.json','utf8');
          const json = JSON.parse(raw);
          console.log('JSON OK');
          console.log('generated_at:', json.generated_at || json.updated_at || '(sin fecha)');
          console.log('aemet ok:', json.aemet_alerts && json.aemet_alerts.ok);
          // v91.52: se buscan VALORES de secreto, no nombres de parámetro.
          // "api_key=[redacted]" o un "eyJ" suelto ya no hacen fallar el job.
          const leaks = {
            jwt: /eyJ[A-Za-z0-9_-]{8,}\.[A-Za-z0-9_-]{8,}/.test(raw),
            api_key_value: /api[_-]?key["']?\s*[:=]\s*["']?(?!\[redacted\])[A-Za-z0-9._-]{12,}/i.test(raw)
          };
          console.log('security:', leaks);
          const aemetOk = !!(json.aemet_alerts && json.aemet_alerts.ok);
          if (!aemetOk) console.log('::warning::AEMET no disponible en esta ejecucion; se publican los avisos cacheados.');
          if (leaks.jwt || leaks.api_key_value) {
            console.error('Se ha detectado posible contenido sensible en datos_playas.json');
            process.exit(1);
          }
          NODE

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet datos_playas.json; then
            echo "No hay cambios en datos_playas.json"
            exit 0
          fi

          git add datos_playas.json
          git commit -m "Actualizar datos meteorológicos"

          # Si el remoto ha avanzado mientras se generaban los datos, reintentamos una vez.
          if ! git push origin main; then
            echo "Push rechazado; sincronizando y regenerando datos..."
            git fetch origin main
            git reset --hard origin/main
            node build-data.mjs
            git add datos_playas.json
            if git diff --cached --quiet; then
              echo "No hay cambios tras sincronizar"
              exit 0
            fi
            git commit -m "Actualizar datos meteorológicos"
            git push origin main
          fi

      # v91.6: aviso a healthchecks.io. Es OPCIONAL: si no existe el secret
      # HEALTHCHECK_URL, el paso no hace nada y el workflow sigue igual que antes.
      - name: Ping a healthchecks.io (opcional)
        if: ${{ always() }}
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ -z "$HEALTHCHECK_URL" ]; then
            echo "Sin HEALTHCHECK_URL configurada; paso omitido."
            exit 0
          fi
          if [ "$JOB_STATUS" = "success" ]; then
            curl -fsS -m 10 --retry 3 "$HEALTHCHECK_URL" >/dev/null || true
            echo "Ping de éxito enviado."
          else
            curl -fsS -m 10 --retry 3 "$HEALTHCHECK_URL/fail" >/dev/null || true
            echo "Ping de fallo enviado."
          fi
