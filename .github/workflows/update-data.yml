name: Actualizar datos meteorológicos

on:
  workflow_dispatch:
  schedule:
    # Cada hora, minuto 17. No despliega Netlify, solo actualiza datos_playas.json en este repo.
    - cron: "17 * * * *"

permissions:
  contents: write

concurrency:
  group: actualizar-datos-meteorologicos
  cancel-in-progress: true

jobs:
  update-data:
    name: Generar y guardar datos_playas.json
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Generar datos meteorológicos
        run: node build-data.mjs

      - name: Validar JSON generado
        run: |
          node -e "const fs=require('fs'); const d=JSON.parse(fs.readFileSync('datos_playas.json','utf8')); if(!d.generated_at||!d.beaches) throw new Error('datos_playas.json no válido'); console.log('OK', d.generated_at, Object.keys(d.beaches).length, 'playas');"

      - name: Commit si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add datos_playas.json
          if git diff --cached --quiet; then
            echo "Sin cambios que publicar"
          else
            git commit -m "Actualizar datos meteorológicos"
            git push
          fi
