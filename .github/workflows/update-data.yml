name: Actualizar datos meteorológicos

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

concurrency:
  group: actualizar-datos-meteorologicos
  cancel-in-progress: true

jobs:
  update-data:
    name: Generar y guardar datos_playas.json
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sincronizar con main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Generar datos meteorológicos
        env:
          AEMET_API_KEY: ${{ secrets.AEMET_API_KEY }}
          AEMET_OPENDATA_AREA: esp
        run: node build-data.mjs

      - name: Validar JSON generado
        run: |
          test -f datos_playas.json
          node -e "JSON.parse(require('fs').readFileSync('datos_playas.json','utf8')); console.log('JSON OK')"

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet datos_playas.json; then
            echo "No hay cambios en datos_playas.json"
            exit 0
          fi

          git add datos_playas.json
          git commit -m "Actualizar datos meteorológicos"

          # Si el remoto ha avanzado mientras se generaban los datos, reintentamos una vez.
          if ! git push origin main; then
            echo "Push rechazado; sincronizando y regenerando datos..."
            git fetch origin main
            git reset --hard origin/main
            node build-data.mjs
            git add datos_playas.json
            if git diff --cached --quiet; then
              echo "No hay cambios tras sincronizar"
              exit 0
            fi
            git commit -m "Actualizar datos meteorológicos"
            git push origin main
          fi
