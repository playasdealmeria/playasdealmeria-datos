name: Actualizar datos meteorológicos

# v91.6 (Fase 0): añade ping opcional a healthchecks.io al final de cada ejecución.
# Si el workflow deja de ejecutarse (cron de GitHub retrasado/saltado) o falla,
# healthchecks.io te avisa por email. El resto del workflow es idéntico a v91.5.
#
# El cron interno se mantiene como RESPALDO; el disparador principal pasa a ser
# cron-job.org llamando a workflow_dispatch (ver LEEME_PARCHE_V91_23_FASE0.md).

on:
  workflow_dispatch:
  schedule:
    # Cada 30 minutos. Usamos minutos 17 y 47 para evitar el minuto 00,
    # donde GitHub suele acumular más carga y puede retrasar o saltarse ejecuciones.
    # Importante: GitHub Actions cron usa UTC.
    - cron: "17,47 * * * *"

permissions:
  contents: write

concurrency:
  group: actualizar-datos-meteorologicos
  cancel-in-progress: true

jobs:
  update-data:
    name: Generar y guardar datos_playas.json
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      AEMET_API_KEY: ${{ secrets.AEMET_API_KEY }}
      AEMET_OPENDATA_AREA: esp
      # v91.11 · 9 jul 2026. Desde el runner de GitHub, TODAS las peticiones a
      # maps.andalucia.org morían por timeout (elapsed_ms 120011, truncated:true,
      # "This operation was aborted" x40). Desde un PC en España responden en ~226 ms.
      # Node 18+ resuelve DNS en orden "verbatim": si hay registro AAAA y la ruta IPv6
      # no funciona, se queda esperando hasta el abort. Los runners tienen IPv6; tu PC
      # prefiere IPv4. Esto fuerza IPv4 en TODOS los pasos, incluida la regeneración
      # que hace el paso de push si el remoto ha avanzado.
      NODE_OPTIONS: --dns-result-order=ipv4first
      # TEMPORAL: apagado mientras diagnosticamos. Cada run desperdiciaba 180 s.
      # Volver a quitar esta línea (o poner "true") cuando el diagnóstico esté resuelto.
      JUNTA_OFICIAL: "false"
      # Márgenes algo más anchos que en local: el runner está más lejos.
      # Solo penalizan cuando algo va mal; si responde en 226 ms, no se notan.
      JUNTA_TIMEOUT_MS: "10000"
      JUNTA_BUDGET_MS: "180000"

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configurar Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Sincronizar con main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Validar secret AEMET
        run: |
          if [ -z "$AEMET_API_KEY" ]; then
            echo "::error::Falta el secret AEMET_API_KEY en este repositorio"
            exit 1
          fi
          echo "AEMET_API_KEY configurada"

      - name: Comprobar sintaxis del generador
        run: node --check build-data.mjs

      # ── TEMPORAL (v91.11c) ─────────────────────────────────────────────────
      # Estado: curl -4 conectó en 115 ms (run #392). Node falla SIEMPRE con
      # UND_ERR_CONNECT_TIMEOUT, incluso https.get con family:4 (run #395).
      # No es undici, no es happy-eyeballs, no es el DNS.
      # Dos cosas que faltan por comprobar:
      #   (1) ¿había proxy? curl lo respeta; el fetch de Node lo ignora.
      #   (2) ¿este runner concreto llega? Cada run es una VM con IP distinta.
      #       Por eso curl y Node se ALTERNAN aquí, en el mismo paso.
      - name: Diagnóstico Junta
        continue-on-error: true
        run: |
          IP=217.12.19.133
          URL=https://maps.andalucia.org/rest-turistico/rest/beach/get/16204

          echo "=== 1 · ¿hay proxy en el entorno? ==="
          env | grep -iE '^(http_proxy|https_proxy|no_proxy|HTTP_PROXY|HTTPS_PROXY|NO_PROXY)=' || echo "  (ninguno)"

          echo ""
          echo "=== 2 · TCP crudo desde el shell, por IP ==="
          if timeout 8 bash -c "cat < /dev/null > /dev/tcp/$IP/443" 2>/dev/null; then
            echo "  TCP 443 ABIERTO"
          else
            echo "  TCP 443 NO SE ABRE (timeout u error)"
          fi

          echo ""
          echo "=== 3 · curl -4 (control) ==="
          curl -s -o /dev/null -4 --max-time 15 \
            -w "  http=%{http_code} conexion=%{time_connect}s total=%{time_total}s\n" $URL \
            || echo "  curl FALLA"

          echo ""
          echo "=== 4 · node, en la misma maquina y el mismo segundo ==="
          node - <<'NODE'
          const dns=require('node:dns'), https=require('node:https');
          const HOST='maps.andalucia.org', IP='217.12.19.133';
          const PATH='/rest-turistico/rest/beach/get/16204';

          dns.lookup(HOST,{all:true},(e,a)=>console.log('  dns.lookup ->', e?e.message:JSON.stringify(a)));

          const t0=Date.now();
          const req=https.get({host:IP, servername:HOST, path:PATH, headers:{Host:HOST}, timeout:12000},
            r=>{r.resume(); console.log('  node https POR IP -> http='+r.statusCode+' en '+(Date.now()-t0)+' ms');});
          req.on('timeout',()=>{console.log('  node https POR IP -> TIMEOUT tras '+(Date.now()-t0)+' ms'); req.destroy();});
          req.on('error',e=>console.log('  node https POR IP -> '+e.code+' '+e.message+' tras '+(Date.now()-t0)+' ms'));
          NODE

          echo ""
          echo "=== 5 · curl otra vez, por si esto va y viene ==="
          curl -s -o /dev/null -4 --max-time 15 \
            -w "  http=%{http_code} conexion=%{time_connect}s total=%{time_total}s\n" $URL \
            || echo "  curl FALLA"

          echo ""
          echo "=== 6 · openssl: ¿llega el saludo TLS? ==="
          timeout 12 openssl s_client -connect $IP:443 -servername $HOST -brief </dev/null 2>&1 | head -6 \
            || echo "  openssl FALLA / timeout"
      # ───────────────────────────────────────────────────────────────────────

      - name: Generar datos meteorológicos
        run: node build-data.mjs

      - name: Validar JSON generado
        run: |
          test -f datos_playas.json
          node - <<'NODE'
          const fs = require('fs');
          const raw = fs.readFileSync('datos_playas.json','utf8');
          const json = JSON.parse(raw);
          console.log('JSON OK');
          console.log('generated_at:', json.generated_at || json.updated_at || '(sin fecha)');
          console.log('aemet ok:', json.aemet_alerts && json.aemet_alerts.ok);
          // v91.52: se buscan VALORES de secreto, no nombres de parámetro.
          // "api_key=[redacted]" o un "eyJ" suelto ya no hacen fallar el job.
          const leaks = {
            jwt: /eyJ[A-Za-z0-9_-]{8,}\.[A-Za-z0-9_-]{8,}/.test(raw),
            api_key_value: /api[_-]?key["']?\s*[:=]\s*["']?(?!\[redacted\])[A-Za-z0-9._-]{12,}/i.test(raw)
          };
          console.log('security:', leaks);
          const aemetOk = !!(json.aemet_alerts && json.aemet_alerts.ok);
          if (!aemetOk) console.log('::warning::AEMET no disponible en esta ejecucion; se publican los avisos cacheados.');
          if (leaks.jwt || leaks.api_key_value) {
            console.error('Se ha detectado posible contenido sensible en datos_playas.json');
            process.exit(1);
          }
          NODE

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet datos_playas.json; then
            echo "No hay cambios en datos_playas.json"
            exit 0
          fi

          git add datos_playas.json
          git commit -m "Actualizar datos meteorológicos"

          # Si el remoto ha avanzado mientras se generaban los datos, reintentamos una vez.
          if ! git push origin main; then
            echo "Push rechazado; sincronizando y regenerando datos..."
            git fetch origin main
            git reset --hard origin/main
            node build-data.mjs
            git add datos_playas.json
            if git diff --cached --quiet; then
              echo "No hay cambios tras sincronizar"
              exit 0
            fi
            git commit -m "Actualizar datos meteorológicos"
            git push origin main
          fi

      # v91.6: aviso a healthchecks.io. Es OPCIONAL: si no existe el secret
      # HEALTHCHECK_URL, el paso no hace nada y el workflow sigue igual que antes.
      - name: Ping a healthchecks.io (opcional)
        if: ${{ always() }}
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ -z "$HEALTHCHECK_URL" ]; then
            echo "Sin HEALTHCHECK_URL configurada; paso omitido."
            exit 0
          fi
          if [ "$JOB_STATUS" = "success" ]; then
            curl -fsS -m 10 --retry 3 "$HEALTHCHECK_URL" >/dev/null || true
            echo "Ping de éxito enviado."
          else
            curl -fsS -m 10 --retry 3 "$HEALTHCHECK_URL/fail" >/dev/null || true
            echo "Ping de fallo enviado."
          fi
