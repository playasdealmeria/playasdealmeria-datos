name: Actualizar datos meteorológicos

# v91.6 (Fase 0): añade ping opcional a healthchecks.io al final de cada ejecución.
# Si el workflow deja de ejecutarse (cron de GitHub retrasado/saltado) o falla,
# healthchecks.io te avisa por email. El resto del workflow es idéntico a v91.5.
#
# El cron interno se mantiene como RESPALDO; el disparador principal pasa a ser
# cron-job.org llamando a workflow_dispatch (ver LEEME_PARCHE_V91_23_FASE0.md).

on:
  workflow_dispatch:
  schedule:
    # Cada 30 minutos. Usamos minutos 17 y 47 para evitar el minuto 00,
    # donde GitHub suele acumular más carga y puede retrasar o saltarse ejecuciones.
    # Importante: GitHub Actions cron usa UTC.
    - cron: "17,47 * * * *"

permissions:
  contents: write

concurrency:
  group: actualizar-datos-meteorologicos
  cancel-in-progress: true

jobs:
  update-data:
    name: Generar y guardar datos_playas.json
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      AEMET_API_KEY: ${{ secrets.AEMET_API_KEY }}
      AEMET_OPENDATA_AREA: esp
      # v91.11 · 9 jul 2026. Desde el runner de GitHub, TODAS las peticiones a la Junta
      # morían por timeout. Diagnóstico (4 runs): el TCP conecta en 88 ms, curl -4 y
      # openssl negocian TLS 1.3 sin problema, pero el handshake TLS de Node se cuelga.
      # Node 24 manda un ClientHello grande (grupos post-cuánticos de OpenSSL) que un
      # balanceador delante de la Junta descarta. Con TLS 1.2 responde en 413 ms.
      # El arreglo vive en build-data.mjs (Agent de node:https). Aquí solo los márgenes.
      #
      # Si algún día arreglan su balanceador: JUNTA_TLS_MAX: "TLSv1.3" y comprobar el log.
      JUNTA_TIMEOUT_MS: "10000"
      JUNTA_BUDGET_MS: "180000"

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configurar Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Sincronizar con main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Validar secret AEMET
        run: |
          if [ -z "$AEMET_API_KEY" ]; then
            echo "::error::Falta el secret AEMET_API_KEY en este repositorio"
            exit 1
          fi
          echo "AEMET_API_KEY configurada"

      - name: Comprobar sintaxis del generador
        run: node --check build-data.mjs


      - name: Generar datos meteorológicos
        run: node build-data.mjs

      - name: Validar JSON generado
        run: |
          test -f datos_playas.json
          node - <<'NODE'
          const fs = require('fs');
          const raw = fs.readFileSync('datos_playas.json','utf8');
          const json = JSON.parse(raw);
          console.log('JSON OK');
          console.log('generated_at:', json.generated_at || json.updated_at || '(sin fecha)');
          console.log('aemet ok:', json.aemet_alerts && json.aemet_alerts.ok);
          // v91.52: se buscan VALORES de secreto, no nombres de parámetro.
          // "api_key=[redacted]" o un "eyJ" suelto ya no hacen fallar el job.
          const leaks = {
            jwt: /eyJ[A-Za-z0-9_-]{8,}\.[A-Za-z0-9_-]{8,}/.test(raw),
            api_key_value: /api[_-]?key["']?\s*[:=]\s*["']?(?!\[redacted\])[A-Za-z0-9._-]{12,}/i.test(raw)
          };
          console.log('security:', leaks);
          const aemetOk = !!(json.aemet_alerts && json.aemet_alerts.ok);
          if (!aemetOk) console.log('::warning::AEMET no disponible en esta ejecucion; se publican los avisos cacheados.');
          if (leaks.jwt || leaks.api_key_value) {
            console.error('Se ha detectado posible contenido sensible en datos_playas.json');
            process.exit(1);
          }
          NODE

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet datos_playas.json; then
            echo "No hay cambios en datos_playas.json"
            exit 0
          fi

          git add datos_playas.json
          git commit -m "Actualizar datos meteorológicos"

          # Si el remoto ha avanzado mientras se generaban los datos, reintentamos una vez.
          if ! git push origin main; then
            echo "Push rechazado; sincronizando y regenerando datos..."
            git fetch origin main
            git reset --hard origin/main
            node build-data.mjs
            git add datos_playas.json
            if git diff --cached --quiet; then
              echo "No hay cambios tras sincronizar"
              exit 0
            fi
            git commit -m "Actualizar datos meteorológicos"
            git push origin main
          fi

      # v91.6: aviso a healthchecks.io. Es OPCIONAL: si no existe el secret
      # HEALTHCHECK_URL, el paso no hace nada y el workflow sigue igual que antes.
      - name: Ping a healthchecks.io (opcional)
        if: ${{ always() }}
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ -z "$HEALTHCHECK_URL" ]; then
            echo "Sin HEALTHCHECK_URL configurada; paso omitido."
            exit 0
          fi
          if [ "$JOB_STATUS" = "success" ]; then
            curl -fsS -m 10 --retry 3 "$HEALTHCHECK_URL" >/dev/null || true
            echo "Ping de éxito enviado."
          else
            curl -fsS -m 10 --retry 3 "$HEALTHCHECK_URL/fail" >/dev/null || true
            echo "Ping de fallo enviado."
          fi
